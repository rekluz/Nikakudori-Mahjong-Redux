name: Android CI/CD Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_lint:
    name: Build & Code Formatting Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Code Quality - Detekt Analysis
      # Assuming detekt is integrated into the gradle scripts
      run: ./gradlew detekt --continue

    - name: Build Debug Runtime (APK Validation)
      run: ./gradlew assembleDebug

    - name: Run Background Tests
      run: ./gradlew testDebugUnitTest

    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
